name: Build XMRig Windows Release

on:
  workflow_dispatch:

jobs:
  build_win:
    name: Build Windows artifact
    runs-on: windows-2022
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Setup MSYS2 + UCRT64
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >
            base-devel
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-7zip
            cmake
            git

      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Clone deps
        run: git clone https://github.com/xmrig/xmrig-deps.git

      - name: Build XMRig
        run: |
          cmake . -G "Unix Makefiles" -DXMRIG_DEPS=./xmrig-deps/gcc/x64
          make -j2
          cp ./src/config.json .
          cp ./bin/WinRing0/WinRing0x64.sys .
          7z a -tzip -mx windows_build.zip xmrig.exe config.json WinRing0x64.sys

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows_build
          path: windows_build.zip

  show_url:
    name: Show download URL
    runs-on: ubuntu-latest
    needs: build_win
    steps:
      - name: Get artifact download URL
        id: artifact
        uses: actions/github-script@v6
        with:
          script: |
            const artifacts = await github.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            const winArtifact = artifacts.data.artifacts.find(a => a.name === 'windows_build');
            console.log(`Windows artifact download URL: https://github.com/${context.repo.owner}/${context.repo.repo}/suites/${context.runId}/artifacts/${winArtifact.id}`);
