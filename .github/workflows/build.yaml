name: Build XMRig Windows Release

on:
workflow_dispatch:

jobs:
build_win:
runs-on: windows-2022

```
defaults:
  run:
    shell: msys2 {0} -mingw64

steps:
  - name: Setup MSYS2 (MINGW64)
    uses: msys2/setup-msys2@v2
    with:
      msystem: MINGW64
      update: true
      install: >
        mingw-w64-x86_64-gcc
        mingw-w64-x86_64-cmake
        mingw-w64-x86_64-ninja
        mingw-w64-x86_64-7zip
        git

  - name: Checkout xmrig
    uses: actions/checkout@v3

  - name: Clone dependencies
    run: |
      git clone https://github.com/xmrig/xmrig-deps.git
      mv xmrig-deps /c/xmrig-deps

  - name: Configure
    run: |
      mkdir build
      cd build
      cmake .. -G Ninja -DXMRIG_DEPS=/c/xmrig-deps/gcc/x64

  - name: Build
    run: |
      cd build
      ninja

  - name: Package
    run: |
      cd build
      cp ../src/config.json .
      cp ../bin/WinRing0/WinRing0x64.sys .
      7z a -tzip -mx windows_build.zip xmrig.exe config.json WinRing0x64.sys

  - name: Upload artifact
    uses: actions/upload-artifact@v4
    with:
      name: windows_build
      path: build/windows_build.zip
```
